    <style>
      /* Custom scrollbar for Webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      
      /* Leaflet z-index fixes for sidebar overlay */
      .leaflet-pane {
        z-index: 0; 
      }
      .leaflet-control {
        z-index: 10;
      }
    </style>
<link rel="stylesheet" href="/index.css">
